services:
  postgres:
    image: postgres:16-alpine
    container_name: statuspage-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: statuspage
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d statuspage"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
